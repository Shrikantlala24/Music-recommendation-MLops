services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-recommender-api
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlartifacts:/app/mlartifacts
      - ./data/processed:/app/data/processed
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
