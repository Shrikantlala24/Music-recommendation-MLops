name: Retrain

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why retraining is being triggered"
        required: true
        type: string

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DVC pipeline retraining
        env:
          RETRAIN_REASON: ${{ github.event.inputs.reason }}
        run: dvc repro

      - name: Commit updated dvc.lock if changed
        run: |
          if git diff --quiet -- dvc.lock; then
            echo "No dvc.lock changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dvc.lock
          git commit -m "chore: retrain model via workflow dispatch"
          git push

      - name: Confirm MLflow registration behavior
        env:
          RETRAIN_REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "Model registration and Staging promotion are handled by src/model/train.py during dvc repro."
